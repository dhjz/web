
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>软件仓库聚合</title>
  <!-- <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/vue/3.5.17/vue.global.prod.js"></script> -->
  <script src="/static/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-size: 14px; }
    body { font-family: Arial, sans-serif; height: 100dvh; overflow: hidden; }
    #app { display: flex; height: 100dvh; }
    input, select { background-color: #fff; border-radius: 4px; border: 1px solid #dcdfe6;  color: #333; line-height: 32px; padding: 0 4px; outline: none; margin: 0 4px; display: inline-block; max-width: 96%; }
    .sidebar { height: 100dvh; position: fixed; width: 140px; left: 0; top: 0; z-index: 1; background-color: #f5f5f5; border-right: 1px solid #ddd; overflow: auto; transition: width 0.3s ease; }
    .sb-hide .sidebar { width: 0 !important; border-right: none; }
    .sidebar-list { list-style: none; overflow-y: auto; height: calc(100% - 50px); margin-top: 10px; }
    .sidebar-list li { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #eee; transition: background-color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-list li:hover { background-color: #e9e9e9; }
    .sidebar-list li.active { background-color: #007bff; color: white; }
    .sidebar-list li i {font-size: 12px; float: right; opacity: .6; user-select: none; }
    .content { flex: 1; display: flex; flex-direction: column; position: relative; }
    .toggle-btn { position: absolute; top: 4px; left: 148px; background-color: rgba(255, 255, 255, 0.9); border: 1px solid #ddd; 
      border-radius: 50%; cursor: pointer; font-size: 13px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; 
      z-index: 1000; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); transition: all 0.3s ease; opacity: .3; }
    .sb-hide .toggle-btn { left: 4px; }
    .toggle-btn:hover { background-color: #f0f0f0; transform: scale(1.05); opacity: .8; }
    .iframe-container { flex: 1; width: 100%; border: none; }
  </style>
</head>
<body>
  <div id="app">
    <div class="sidebar">
      <input type="text" v-model="keyword" placeholder="关键词回车搜索" @keyup.enter="doSearch">
      <ul class="sidebar-list">
        <li v-for="(site, index) in appData" :key="index" :class="{ active: currInd === index }"
          @click="selectSite(site, index)" :title="site.name">
          {{ site.name }} <i @click.stop="open(site.url)">🔗</i>
        </li>
      </ul>
    </div>
    <div class="content">
      <button class="toggle-btn" @click="toggleSidebar">
        {{ isSbHide ? '▶' : '◀' }}
      </button>
      <template v-for="(site, ind) in appData">
        <iframe v-if="site.load" v-show="ind == currInd" :src="site.url" class="iframe-container" frameborder="0" allowfullscreen>
        </iframe>
      </template>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    var vueApp = Vue.createApp({
      data() {
        return {
          currInd: 0,
          keyword: '',
          isSbHide: localStorage.getItem('isSbHide') !== 'false',
          originalData: apps,
          appData: []
        }
      },
      created() {
        this.resetAppData();
      },
      mounted() {
        document.body.classList.toggle('sb-hide', this.isSbHide);
      },
      methods: {
        resetAppData() {
          this.appData = this.originalData.map(item => ({
            ...item,
            url: item.url.replace('%s', encodeURIComponent(this.keyword || '')),
            load: false
          }));
          if (this.appData.length > 0) {
            this.appData[0].load = true;
          }
        },
        doSearch() {
          this.resetAppData();
          this.currInd = 0;
          // document.body.classList.add('sb-hide');
        },
        open(url) {
          window.open(url);
        },
        selectSite(site, ind) {
          site.load = true;
          this.currInd = ind;
          // this.toggleSidebar()
        },
        toggleSidebar() {
          this.isSbHide = !this.isSbHide;
          localStorage.setItem('isSbHide', this.isSbHide);
          document.body.classList.toggle('sb-hide', this.isSbHide);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
