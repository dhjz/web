<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本转PDF工具</title>
    <script src="https://mirrors.sustech.edu.cn/cdnjs/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style id="page-style">@page { margin: 20mm; }</style>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', "Microsoft YaHei", sans-serif; background-color: #f4f7f6; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; padding: 20px; position: relative; }
        textarea { flex-grow: 1; width: 100%; resize: none; padding: 20px; font-size: 16px; line-height: 1.6; border: 2px dashed #ccc; border-radius: 8px; outline: none; background-color: #fff; transition: border-color 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        textarea:focus { border-color: #4CAF50; }
        .controls-container { margin-top: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px 25px; display: flex; flex-direction: column; gap: 15px; }
        .main-controls { display: flex; justify-content: space-between; align-items: center; }
        .settings-group { display: flex; gap: 30px; align-items: center; }
        .radio-group { display: flex; gap: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 5px; color: #d84315; font-weight: bold; cursor: pointer; }
        .settings-group label { cursor: pointer; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .custom-params { display: none; align-items: center; gap: 25px; background-color: #fff3e0; padding: 12px 20px; border-radius: 6px; border: 1px dashed #ffb74d; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-params label { font-size: 14px; color: #333; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .custom-params input { width: 70px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; outline: none; font-family: inherit; }
        .custom-params input:focus { border-color: #ff9800; }
        .btn-group { display: flex; gap: 12px; }
        button { color: white; border: none; padding: 10px 20px; font-size: 15px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s, transform 0.1s; }
        .btn-primary { background-color: #2196F3; }
        .btn-primary:hover { background-color: #1976D2; }
        .btn-secondary { background-color: #4CAF50; }
        .btn-secondary:hover { background-color: #45a049; }
        .btn-clear { background-color: #f44336; }
        .btn-clear:hover { background-color: #da190b; }
        button:active { transform: scale(0.98); }
        #drop-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(33, 150, 243, 0.9); color: white; font-size: 32px; font-weight: bold; display: none; justify-content: center; align-items: center; z-index: 9999; pointer-events: none; }
        #print-container { display: none; }
        @media print { body * { visibility: hidden; } body, html { background-color: #fff; margin: 0; padding: 0; height: auto; overflow: visible; } #print-container, #print-container * { visibility: visible; } #print-container { display: block; position: absolute; left: 0; top: 0; width: 100%; white-space: pre-wrap; word-wrap: break-word; font-family: 'Segoe UI', "Microsoft YaHei", sans-serif; color: #000; } }
    </style>
</head>
<body>

    <div class="container" id="drop-zone">
        <div id="drop-overlay">松开鼠标，将文件导入到文本框</div>
        <textarea id="text-input" placeholder="请在此输入文本，或者将 .txt 文件拖拽到页面任意位置..."></textarea>
        
        <div class="controls-container">
            <div class="main-controls">
                <div class="settings-group">
                    <div class="radio-group">
                        <label><input type="radio" name="insert-mode" value="overwrite" checked> 覆盖原内容</label>
                        <label><input type="radio" name="insert-mode" value="append"> 追加到末尾</label>
                    </div>
                    <label class="checkbox-group">
                        <input type="checkbox" id="custom-mode"> 开启自定义排版 (减少页数)
                    </label>
                </div>
                <div class="btn-group">
                    <button id="clear-btn" class="btn-clear">清空</button>
                    <button id="convert-img-btn" class="btn-secondary">生成图片版 PDF</button>
                    <button id="convert-text-btn" class="btn-primary">生成文本版 PDF (可复制)</button>
                </div>
            </div>

            <div class="custom-params" id="custom-params-panel">
                <label>字号 (pt): <input type="number" id="param-fontsize" value="10.5" step="0.5" min="5"></label>
                <label>行高 (倍数): <input type="number" id="param-lineheight" value="1.4" step="0.1" min="1"></label>
                <label>页边距 (mm): <input type="number" id="param-margin" value="10" step="1" min="0"></label>
            </div>
        </div>
    </div>

    <div id="print-container"></div>

    <script>
        // DOM 获取
        const dropOverlay = document.getElementById('drop-overlay');
        const textarea = document.getElementById('text-input');
        const clearBtn = document.getElementById('clear-btn');
        const convertImgBtn = document.getElementById('convert-img-btn');
        const convertTextBtn = document.getElementById('convert-text-btn');
        const printContainer = document.getElementById('print-container');
        const pageStyle = document.getElementById('page-style');
        
        const customModeCheckbox = document.getElementById('custom-mode');
        const customParamsPanel = document.getElementById('custom-params-panel');
        const inputFontSize = document.getElementById('param-fontsize');
        const inputLineHeight = document.getElementById('param-lineheight');
        const inputMargin = document.getElementById('param-margin');

        // ====== LocalStorage 缓存逻辑 ======
        function loadSettings() {
            if(localStorage.getItem('pdf_customMode') === 'true') {
                customModeCheckbox.checked = true;
                customParamsPanel.style.display = 'flex';
            }
            if(localStorage.getItem('pdf_fontSize')) inputFontSize.value = localStorage.getItem('pdf_fontSize');
            if(localStorage.getItem('pdf_lineHeight')) inputLineHeight.value = localStorage.getItem('pdf_lineHeight');
            if(localStorage.getItem('pdf_margin')) inputMargin.value = localStorage.getItem('pdf_margin');
        }

        function saveSettings() {
            localStorage.setItem('pdf_customMode', customModeCheckbox.checked);
            localStorage.setItem('pdf_fontSize', inputFontSize.value);
            localStorage.setItem('pdf_lineHeight', inputLineHeight.value);
            localStorage.setItem('pdf_margin', inputMargin.value);
        }

        // 监听参数变化并缓存
        customModeCheckbox.addEventListener('change', (e) => {
            customParamsPanel.style.display = e.target.checked ? 'flex' : 'none';
            saveSettings();
        });
        inputFontSize.addEventListener('input', saveSettings);
        inputLineHeight.addEventListener('input', saveSettings);
        inputMargin.addEventListener('input', saveSettings);

        // 页面加载时恢复设置
        loadSettings();

        // ====== 基础控制与拖拽逻辑 ======
        clearBtn.addEventListener('click', () => {
            if (textarea.value.trim() !== '' && confirm('确定要清空文本框中的所有内容吗？')) textarea.value = '';
        });

        window.addEventListener('dragenter', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
        window.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.clientX === 0 || e.clientY === 0) dropOverlay.style.display = 'none';
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropOverlay.style.display = 'none';
            const files = e.dataTransfer.files;
            if (files.length === 0) return;
            const file = files[0];
            if (!file.type.includes('text') && !file.name.endsWith('.txt') && !file.name.endsWith('.md')) return alert('请上传文本文件 (.txt, .md 等)');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const textContent = event.target.result;
                const mode = document.querySelector('input[name="insert-mode"]:checked').value;
                if (mode === 'overwrite') {
                    textarea.value = textContent;
                } else if (mode === 'append') {
                    const appendText = `文件名: ${file.name}\n文件内容:\n${textContent}\n`;
                    if (textarea.value && !textarea.value.endsWith('\n')) textarea.value += '\n\n'; 
                    else if (textarea.value) textarea.value += '\n';
                    textarea.value += appendText;
                }
            };
            reader.readAsText(file, 'UTF-8');
        });

        // ====== 生成可复制的文本版 PDF ======
        convertTextBtn.addEventListener('click', () => {
            if (!textarea.value.trim()) return alert('没有可转换的内容！');
            printContainer.innerText = textarea.value.trim();

            if (customModeCheckbox.checked) {
                printContainer.style.fontSize = (parseFloat(inputFontSize.value) || 10.5) + 'pt';
                printContainer.style.lineHeight = parseFloat(inputLineHeight.value) || 1.4;
                pageStyle.innerHTML = `@page { margin: ${parseFloat(inputMargin.value) || 10}mm; }`; 
            } else {
                printContainer.style.fontSize = '12pt';   
                printContainer.style.lineHeight = '1.8';  
                pageStyle.innerHTML = '@page { margin: 20mm; }'; 
            }
            window.print();
        });

        // ====== 生成不可复制的图片版 PDF ======
        convertImgBtn.addEventListener('click', () => {
            if (!textarea.value.trim()) return alert('没有可转换的内容！');
            
            const originalBtnText = convertImgBtn.innerText;
            convertImgBtn.innerText = '正在生成...';
            convertImgBtn.disabled = true;

            let pdfFontSize = '12pt', pdfLineHeight = '1.8', pdfMargin = 15;
            if (customModeCheckbox.checked) {
                pdfFontSize = (parseFloat(inputFontSize.value) || 10.5) + 'pt';
                pdfLineHeight = (parseFloat(inputLineHeight.value) || 1.4).toString();
                pdfMargin = parseFloat(inputMargin.value) || 10;
            }

            const tempDiv = document.createElement('div');
            tempDiv.style.whiteSpace = 'pre-wrap';
            tempDiv.style.wordWrap = 'break-word';
            tempDiv.style.fontFamily = '"Microsoft YaHei", sans-serif';
            tempDiv.style.fontSize = pdfFontSize;
            tempDiv.style.lineHeight = pdfLineHeight;
            tempDiv.innerText = textarea.value.trim();

            const opt = {
                margin: pdfMargin, 
                filename: `文本转换_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(tempDiv).save().then(() => {
                convertImgBtn.innerText = originalBtnText;
                convertImgBtn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert('PDF生成失败');
                convertImgBtn.innerText = originalBtnText;
                convertImgBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
